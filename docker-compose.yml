version: "3.9"

services:
  frontend:
    container_name: frontend
    build: frontend/
    image: frontend
    ports:
      - 8010:8010
    networks:
      - transcendence
    restart: unless-stopped

  backend:
    container_name: backend
    build: backend/
    image: backend
    ports:
      - 3030:3030
    networks:
      - transcendence
    restart: unless-stopped

  database:
    container_name: postgres
    image: postgres
    ports:
      - 5050:5050
    networks:
      - transcendence
    restart: unless-stopped


networks:
  transcendence:
    name: transcendence
    driver: bridge
